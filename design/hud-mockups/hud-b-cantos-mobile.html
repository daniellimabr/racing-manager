<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>HUD B — Cantos (mobile clássico)</title>
<style>body{margin:0;background:#0a0a0a;display:flex;justify-content:center;padding:16px 0;}canvas{background:#1a1a1a;}</style>
</head>
<body>
<canvas id="c" width="480" height="800"></canvas>
<script>
const ctx = document.getElementById('c').getContext('2d');
const W = 480, H = 800;
const HUD_H = 120;

function drawTrackPlaceholder(topY) {
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(0, 0, W, H);
  const cx = W / 2, cy = topY + (H - topY) / 2, rx = 190, ry = (H - topY) / 2 - 36;
  ctx.strokeStyle = '#3a3a3a';
  ctx.lineWidth = 26;
  ctx.beginPath();
  ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
  ctx.stroke();
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 2;
  ctx.setLineDash([6, 8]);
  ctx.beginPath();
  ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
  ctx.stroke();
  ctx.setLineDash([]);

  const cars = [
    { angle: -1.4, r: 12, color: '#ffdd33', ring: false },
    { angle: -1.1, r: 9, color: '#7788ff', ring: true },
    { angle: -0.7, r: 8, color: '#cc66ff', ring: true },
    { angle: 0.4, r: 5, color: '#999', ring: false },
    { angle: 1.2, r: 5, color: '#999', ring: false },
    { angle: 2.1, r: 5, color: '#999', ring: false },
  ];
  for (const c of cars) {
    const x = cx + Math.cos(c.angle) * rx;
    const y = cy + Math.sin(c.angle) * ry;
    if (c.ring) {
      ctx.beginPath();
      ctx.arc(x, y, c.r + 4, 0, Math.PI * 2);
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.stroke();
    }
    ctx.beginPath();
    ctx.arc(x, y, c.r, 0, Math.PI * 2);
    ctx.fillStyle = c.color;
    ctx.fill();
  }
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function drawHud() {
  ctx.fillStyle = '#1c1c22';
  ctx.fillRect(0, 0, W, HUD_H);
  ctx.strokeStyle = '#000';
  ctx.beginPath(); ctx.moveTo(0, HUD_H); ctx.lineTo(W, HUD_H); ctx.stroke();

  // badge de posição (canto sup. esquerdo)
  ctx.beginPath();
  ctx.arc(40, 34, 26, 0, Math.PI * 2);
  ctx.fillStyle = '#2a2a30';
  ctx.fill();
  ctx.lineWidth = 4;
  ctx.strokeStyle = '#cd7f32'; // bronze pra P3
  ctx.stroke();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 22px system-ui';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('P3', 40, 36);

  // pill de volta (topo centro)
  roundRect(W / 2 - 50, 14, 100, 26, 13);
  ctx.fillStyle = '#2a2a30';
  ctx.fill();
  ctx.font = 'bold 13px system-ui';
  ctx.fillStyle = '#fff';
  ctx.fillText('VOLTA 5/8', W / 2, 28);

  // gap (canto sup. direito) + seta
  const gap = 0.482;
  ctx.textAlign = 'right';
  ctx.textBaseline = 'alphabetic';
  ctx.font = 'bold 26px system-ui';
  ctx.fillStyle = gap > 0 ? '#e74c3c' : '#2ecc71';
  ctx.fillText((gap > 0 ? '+' : '') + gap.toFixed(3), W - 44, 40);
  ctx.beginPath();
  ctx.moveTo(W - 20, 30); ctx.lineTo(W - 30, 30); ctx.lineTo(W - 25, 40);
  ctx.closePath();
  ctx.fillStyle = gap > 0 ? '#e74c3c' : '#2ecc71';
  ctx.fill();

  // saude: 5 blocos (canto inf. esquerdo)
  const hpPct = 72 / 180;
  const filled = Math.round(hpPct * 5);
  ctx.textAlign = 'left';
  ctx.font = '11px system-ui';
  ctx.fillStyle = '#999';
  ctx.fillText('SAÚDE', 16, 74);
  for (let i = 0; i < 5; i++) {
    const x = 16 + i * 24;
    roundRect(x, 82, 18, 24, 3);
    ctx.fillStyle = i < filled ? (filled >= 3 ? '#2ecc71' : filled >= 2 ? '#f1c40f' : '#e74c3c') : '#2a2a2a';
    ctx.fill();
    ctx.strokeStyle = '#444';
    ctx.stroke();
  }

  // nitro: barra de 3 celulas (canto inf. direito)
  ctx.textAlign = 'right';
  ctx.fillStyle = '#999';
  ctx.font = '11px system-ui';
  ctx.fillText('NITRO', W - 16, 74);
  const charges = 2, total = 3;
  for (let i = 0; i < total; i++) {
    const x = W - 16 - (total - i) * 30 + 6;
    roundRect(x, 82, 24, 24, 4);
    ctx.fillStyle = i < charges ? '#64b5f6' : '#2a2a2a';
    ctx.fill();
    ctx.strokeStyle = '#446';
    ctx.stroke();
  }
}

drawTrackPlaceholder(HUD_H);
drawHud();
</script>
</body>
</html>
